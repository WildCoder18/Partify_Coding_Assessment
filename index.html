<!DOCTYPE html>

<html lang="en">

  <head>
    <link rel="stylesheet" href="Styling.css"> <!-- link to styling.css-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  </head>

<body id="background"> <!-- #background, inorder to seperate and design background -->

 

  <div class="Container"> <!--Make sure to use class and . when connecting css files-->

    <div class="Logo_Container">
      <img class="Logo_Image" src="PartifyLogo_BASE.png" alt="Partify logo">
    </div>
  

  

    <h1 class="Header"> 
      Tell us more about your vehicle
    </h1>

    <form id="Vehicle_Form" autocomplete="off">
        
      <label for="Year">Year</label>
      <!-- <select name="Year" id="Year"> -->
        <select name="Year" id="Year" required>
          
          <option value="" selected disabled>Select Year</option>
            

        </select>

      
        <label for="Make">Make</label>
        <select name="Make" id="Make" required>

          <option value="" selected disabled>Select Make</option>
            


        </select>
      
        

        <label for="Model">Model</label>
        <select name="Model" id="Model" required>
          
          <option value="" selected disabled>Select Model</option>
            

        </select>


        <label for="Product">Product Type</label>
        <select name="Product" id="Product" required>
          
          <option value="" selected disabled>Select Product Type</option>
            

        </select>

      
        <div class="Button_Container">
          <button class="ADD_VEHICLE_BUTTON" type="submit"> 
          Add Vehicle 
          </button> 
        </div>

        

      </form>


      

    </div>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
    

  </body>


</html>
